<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06050F;
    color: #EDE8FF;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
    position: relative;
  }

  /* Glow background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 40%, rgba(138,43,226,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(180,80,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 30% 25% at 80% 15%, rgba(100,0,200,0.1) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 300px; height: 300px;
    background: rgba(120,0,255,0.12);
    top: -80px; left: -80px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 200px; height: 200px;
    background: rgba(200,0,255,0.09);
    bottom: -60px; right: -60px;
    animation-delay: -3s;
  }

  .card {
    position: relative;
    background: rgba(10,7,22,0.92);
    border: 1px solid rgba(138,43,226,0.35);
    border-radius: 14px;
    padding: 3.5rem 3rem;
    max-width: 520px;
    width: 100%;
    backdrop-filter: blur(16px);
    box-shadow:
      0 0 0 1px rgba(180,80,255,0.06) inset,
      0 0 80px rgba(120,0,255,0.1),
      0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.8s ease forwards;
    z-index: 1;
  }

  /* Top shimmer line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 2px;
    background: linear-gradient(90deg, transparent, #7B2FFF, #C084FC, #7B2FFF, transparent);
    border-radius: 99px;
  }

  /* Corner accents */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(138,43,226,0.2), transparent);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 3.5rem;
    line-height: 1;
    background: linear-gradient(135deg, #7B2FFF 0%, #C084FC 50%, #E040FB 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 35px rgba(160,60,255,0.45));
    margin-bottom: 0.2rem;
    letter-spacing: -0.02em;
  }

  .logo-sub {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    color: rgba(180,100,255,0.55);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .flame {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    animation: flicker 2s infinite alternate;
  }

  .desc {
    font-size: 1.1rem;
    color: #8A7AAA;
    line-height: 1.7;
    margin-bottom: 0.6rem;
    font-weight: 600;
  }

  .desc b { color: #B06AFF; }

  .badge {
    display: inline-block;
    background: rgba(120,0,255,0.12);
    border: 1px solid rgba(138,43,226,0.35);
    color: #B06AFF;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border-radius: 99px;
    margin-bottom: 2rem;
    box-shadow: 0 0 16px rgba(120,0,255,0.15);
  }

  .divider {
    width: 50px; height: 2px;
    background: linear-gradient(90deg, #7B2FFF, #C084FC);
    border-radius: 99px;
    margin: 1.5rem auto;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: linear-gradient(135deg, #6A0DAD, #9B3FFF);
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    padding: 0.9rem 2.2rem;
    border-radius: 6px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow:
      0 0 30px rgba(120,0,255,0.35),
      0 0 0 1px rgba(180,100,255,0.2) inset;
    margin-top: 0.5rem;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3s infinite;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow:
      0 8px 40px rgba(120,0,255,0.55),
      0 0 0 1px rgba(200,120,255,0.3) inset;
  }

  .features {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2rem;
  }

  .feature {
    font-size: 0.82rem;
    font-weight: 600;
    color: #5A4A7A;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.2s;
  }

  .feature:hover { color: #9B6ACA; }
  .feature span { color: #7B2FFF; }

  .footer-note {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: rgba(120,90,160,0.45);
    letter-spacing: 0.08em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes flicker {
    0%   { filter: drop-shadow(0 0 8px rgba(160,60,255,0.6)); }
    100% { filter: drop-shadow(0 0 24px rgba(220,100,255,0.9)); }
  }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to   { transform: translate(30px, 20px); }
  }

  @keyframes shimmer {
    0%   { left: -60%; }
    100% { left: 160%; }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <span class="flame">🔥</span>
    <div class="logo">FF ARCHIVE</div>
    <div class="logo-sub">Servidor Oficial</div>

    <span class="badge">⚡ Fake AP Free Fire</span>

    <p class="desc">
      O servidor de <b>apostas fake</b> do Free Fire.<br>
      Aposte AP, suba no ranking e prove seu valor —<br>
      <b>sem envolver dinheiro real.</b>
    </p>

    <div class="divider"></div>

    <a href="https://discord.gg/ZVdDp8GfMm" target="_blank" class="btn">

      <div class="feature"><span>✦</span> Sem dinheiro real</div>

  </div>
</body>
</html>
